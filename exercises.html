<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngân hàng đề — English With Tom</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=5">
</head>
<body data-page="" data-guard="auth">
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="crumb">Trang chủ › Ngân hàng đề</div>
    <h1>Ngân hàng đề 📚</h1>
    <p id="introText">Chọn một đề để luyện tập. Đề Writing được chấm tự động kèm nhận xét; đề Reading/Listening chấm tức thì ngay khi nộp.</p>
  </div>
</section>

<section class="section" style="padding-top:34px;">
  <div class="container">
    <div id="filterBar" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:22px;"></div>
    <div id="list"><p style="color:var(--text-faint);">Đang tải đề...</p></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js?v=10"></script>
<script>
  function qp(n){ return new URLSearchParams(location.search).get(n); }
  function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
  var PROGRAMS = ['KET','PET','FCE','IELTS','APTIS'];
  var current = qp('program') || '';

  // Thanh lọc theo chương trình
  document.getElementById('filterBar').innerHTML =
    ['<a class="btn btn-sm '+(current?'':'btn-primary')+'" href="exercises.html">Tất cả</a>']
    .concat(PROGRAMS.map(function(p){
      return '<a class="btn btn-sm '+(current===p?'btn-primary':'')+'" href="exercises.html?program='+p+'">'+p+'</a>';
    })).join('');

  function doer(e){
    if (e.skill === 'Writing') return { href:'practice-writing.html?id='+e.id, label:'Làm bài', ok:true, tag:'Chấm tự động' };
    if (e.has_questions) return { href:'practice-quiz.html?id='+e.id, label:'Làm bài', ok:true, tag:'Tự chấm' };
    return { href:'#', label:'Đề mẫu', ok:false, tag:'chưa có câu hỏi' };
  }

  fetch('/api/exercises' + (current?('?program='+encodeURIComponent(current)):'')).then(r=>r.json()).then(function(d){
    var list = d.exercises || [];
    if (!list.length) { document.getElementById('list').innerHTML = '<div class="card" style="text-align:center; color:var(--text-faint);">Chưa có đề nào. Giáo viên có thể thêm đề ở <a href="teacher.html" style="color:var(--primary);">Khu vực giáo viên</a>.</div>'; return; }
    // nhóm theo chương trình
    var groups = {};
    list.forEach(function(e){ (groups[e.program] = groups[e.program] || []).push(e); });
    var order = PROGRAMS.filter(function(p){ return groups[p]; });
    document.getElementById('list').innerHTML = order.map(function(p){
      var rows = groups[p].map(function(e){
        var dd = doer(e);
        var btn = dd.ok ? '<a class="btn btn-sm btn-primary" href="'+dd.href+'">'+dd.label+'</a>'
                        : '<span style="font-size:12px;color:var(--text-faint);">('+dd.tag+')</span>';
        return '<div class="test-row"><div><div class="name">'+esc(e.title)+'</div><div class="lvl">'+e.skill+' · '+dd.tag+'</div></div>'+btn+'</div>';
      }).join('');
      return '<div class="card"><div class="card-head"><h3>'+p+'</h3><span class="tag">'+groups[p].length+' đề</span></div>'+rows+'</div>';
    }).join('');
  }).catch(function(){ document.getElementById('list').innerHTML = '<p style="color:var(--text-faint);">Không tải được danh sách đề.</p>'; });
</script>
</body>
</html>
