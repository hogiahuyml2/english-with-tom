<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Làm bài trắc nghiệm — English With Tom</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=5">
<style>.prompt-text{ white-space:pre-line; }</style>
</head>
<body data-page="">
<div id="site-header"></div>

<section class="section" style="padding-top:24px;">
  <div class="container">
    <div class="crumb" style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">
      <a href="#" id="backLink" style="color:var(--primary);">‹ Quay lại</a> › <span id="crumbTitle">Trắc nghiệm</span>
    </div>

    <div class="practice-bar">
      <div>
        <div style="font-weight:700; font-size:16px;" id="exTitle">Đang tải đề...</div>
        <div style="font-size:12.5px; color:var(--text-faint);" id="exSub">Chấm tự động</div>
      </div>
      <div class="timer">⏱ <span id="timer">20:00</span></div>
    </div>

    <div class="two-col">
      <div class="passage">
        <h3>Đề bài / Đoạn văn</h3>
        <div class="prompt-text" id="promptText" style="font-size:14.5px; color:#403d57;">...</div>
      </div>
      <div class="q-block">
        <div id="questions"><p style="color:var(--text-faint);">Đang tải câu hỏi...</p></div>
        <button class="btn btn-primary btn-block" id="submitBtn" style="margin-top:16px;">Nộp bài</button>
        <p style="text-align:center; font-size:12.5px; color:var(--text-faint); margin-top:10px;">Bài sẽ được chấm tự động và lưu vào Tiến trình.</p>
      </div>
    </div>

    <div class="card" id="result" style="display:none; margin-top:22px; border:2px solid var(--success);">
      <div class="card-head"><h3>✅ Đã nộp bài</h3><span class="badge badge-done">Đã chấm tự động</span></div>
      <div class="stat-grid" style="margin-bottom:0;">
        <div class="stat-card"><div class="label">Số câu đúng</div><div class="value" id="resScore">–</div></div>
        <div class="stat-card accent"><div class="label">Tỷ lệ đúng</div><div class="value" id="resPercent">–</div></div>
        <div class="stat-card"><div class="label">Trạng thái</div><div class="value" style="font-size:18px; color:var(--success); padding-top:8px;">Đã lưu ✓</div></div>
      </div>
      <p style="font-size:12.5px; color:var(--text-faint); margin-top:14px;">Xem lại ở trang <a href="dashboard.html" style="color:var(--primary);">Tiến trình</a>.</p>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js?v=7"></script>
<script>
  function qp(n){ return new URLSearchParams(location.search).get(n); }
  function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
  var EXERCISE_ID = parseInt(qp('id')||'0',10);
  var LETTERS = ['A','B','C','D','E'];
  var QS = [];

  fetch('/api/exercises/'+EXERCISE_ID).then(r=>r.json()).then(function(d){
    var e = d.exercise;
    if (!e) { document.getElementById('exTitle').textContent='Không tìm thấy đề'; return; }
    document.getElementById('exTitle').textContent = e.title;
    document.getElementById('crumbTitle').textContent = e.program + ' ' + e.skill;
    document.getElementById('exSub').textContent = e.program + ' · ' + e.skill + ' · chấm tự động';
    document.getElementById('promptText').textContent = e.content || '(Không có đoạn văn)';
    var back = document.getElementById('backLink');
    back.textContent = '‹ ' + e.program; back.href = 'exercises.html?program=' + encodeURIComponent(e.program);
    QS = e.questions || [];
    var box = document.getElementById('questions');
    if (!QS.length) { box.innerHTML = '<p style="color:var(--text-faint);">Đề này chưa có câu hỏi.</p>'; return; }
    box.innerHTML = QS.map(function(q, i){
      var opts = (q.options||[]).map(function(opt, j){
        return '<label class="opt"><input type="radio" name="q'+i+'" value="'+LETTERS[j]+'"> '+LETTERS[j]+'. '+esc(opt)+'</label>';
      }).join('');
      return '<div class="q-item"><div class="q-text">'+(i+1)+'. '+esc(q.q)+'</div>'+opts+'</div>';
    }).join('');
  }).catch(function(){});

  document.getElementById('submitBtn').addEventListener('click', async function(){
    var answers = QS.map(function(_, i){
      var sel = document.querySelector('input[name="q'+i+'"]:checked');
      return sel ? sel.value : '';
    });
    var r = await fetch('/api/submissions', {
      method:'POST', credentials:'same-origin', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ exercise_id: EXERCISE_ID, answers: answers })
    });
    if (r.status === 401) { alert('Bạn cần đăng nhập để nộp bài.'); location.href='login.html?next='+encodeURIComponent('practice-quiz.html?id='+EXERCISE_ID); return; }
    var data = await r.json().catch(function(){return {};});
    if (!r.ok) { alert(data.error||'Nộp bài thất bại.'); return; }
    document.getElementById('resScore').textContent = data.score + '/' + data.max_score;
    document.getElementById('resPercent').textContent = (data.max_score ? Math.round(data.score/data.max_score*100) : 0) + '%';
    var box = document.getElementById('result'); box.style.display='block'; box.scrollIntoView({behavior:'smooth'});
  });
</script>
</body>
</html>
