<style>
.topic-card {
  background:#fff; border:2px solid var(--border); border-radius:var(--radius);
  padding:24px 20px; text-align:center; cursor:pointer;
  transition:border-color .18s, box-shadow .18s, transform .14s;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.topic-card:hover { border-color:var(--primary); box-shadow:var(--shadow-hover); transform:translateY(-2px); }
.topic-card .t-ico { width:54px; height:54px; border-radius:16px; display:grid; place-items:center; font-size:26px; }
.topic-card h3 { font-size:16px; margin:0; }
.topic-card p  { font-size:13px; color:var(--text-muted); margin:0; line-height:1.5; }

.level-btn {
  border:2px solid var(--border); border-radius:14px; padding:18px 24px;
  background:#fff; cursor:pointer; text-align:center; transition:all .18s;
  font-family:var(--font);
}
.level-btn:hover { border-color:var(--primary); background:var(--primary-soft); }
.level-btn .lv-badge { display:inline-block; font-size:22px; font-weight:800; margin-bottom:6px; }
.level-btn .lv-name  { font-size:15px; font-weight:600; display:block; margin-bottom:4px; }
.level-btn .lv-desc  { font-size:12.5px; color:var(--text-muted); }

.word-chip {
  display:inline-flex; align-items:center; padding:8px 14px;
  background:var(--primary-soft); color:var(--primary);
  border:1.5px solid rgba(123,110,246,.25); border-radius:30px;
  font-size:15px; font-weight:600; cursor:pointer; user-select:none;
  transition:background .12s, transform .1s, opacity .12s;
  font-family:var(--font);
}
.word-chip:hover { background:#ddd5ff; transform:scale(1.05); }
.word-chip.correct { background:#d1fae5; color:#065f46; border-color:#6ee7b7; cursor:default; }
.word-chip.wrong   { background:#fee2e2; color:#991b1b; border-color:#fca5a5; cursor:default; }
.word-chip.used    { opacity:.28; cursor:not-allowed; pointer-events:none; }

.answer-area {
  min-height:60px; border:2px dashed var(--border); border-radius:12px;
  padding:10px 12px; display:flex; flex-wrap:wrap; gap:8px; align-items:center;
  background:#fafafe; transition:border-color .2s;
}
.answer-area.has-content { border-color:var(--primary-2); }

.progress-bar { height:6px; border-radius:99px; background:var(--border); overflow:hidden; margin-bottom:8px; }
.progress-fill { height:100%; border-radius:99px; background:var(--gradient); transition:width .35s; }

.result-row { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-radius:10px; margin-bottom:8px; font-size:14px; line-height:1.6; }
.result-row.ok  { background:#d1fae5; color:#065f46; }
.result-row.bad { background:#fee2e2; color:#991b1b; }
.result-row .ri { flex-shrink:0; font-size:16px; }
</style>
</head>

<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="crumb"><a href="practice.html">Luyện tập</a> › Sắp xếp câu</div>
    <h1>🔀 Sắp xếp từ thành câu</h1>
    <p>Chọn chủ đề và cấp độ — bấm các từ theo đúng thứ tự để tạo câu hoàn chỉnh.</p>
  </div>
</section>

<section class="section" style="padding-top:34px; padding-bottom:60px;">
<div class="container" style="max-width:820px;">

  <!-- ═══ SCREEN 0: CHỌN CHỦ ĐỀ ═══ -->
  <div id="screenTopic">
    <div class="section-head" style="margin-bottom:20px;"><h2 style="font-size:20px;">Chọn chủ đề</h2></div>
    <div class="grid grid-3" id="topicGrid"></div>
  </div>

  <!-- ═══ SCREEN 1: CHỌN CẤP ĐỘ ═══ -->
  <div id="screenLevel" style="display:none;">
    <button class="btn btn-sm" onclick="backToTopics()" style="margin-bottom:20px;">← Đổi chủ đề</button>
    <div id="levelTopicLabel" style="margin-bottom:20px;"></div>
    <div class="grid grid-3" style="gap:16px;" id="levelGrid"></div>
  </div>

  <!-- ═══ SCREEN 2: BÀI TẬP ═══ -->
  <div id="screenExercise" style="display:none;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;">
      <button class="btn btn-sm" onclick="backToLevel()">← Đổi cấp độ</button>
      <span id="exMeta" style="font-size:13px; color:var(--text-muted);"></span>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text-faint); margin-bottom:20px;">
      <span id="progressLabel">Câu 1/20</span>
      <span id="scoreLabel">Đúng: 0</span>
    </div>

    <div style="margin-bottom:14px;">
      <div style="font-size:12px; font-weight:700; color:var(--text-faint); margin-bottom:6px; text-transform:uppercase; letter-spacing:.06em;">Câu của bạn</div>
      <div class="answer-area" id="answerArea">
        <span style="color:var(--text-faint); font-size:14px;" id="answerPlaceholder">Bấm các từ bên dưới để xếp vào đây...</span>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:12px; font-weight:700; color:var(--text-faint); margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em;">Từ gợi ý</div>
      <div id="wordBank" style="display:flex; flex-wrap:wrap; gap:8px; min-height:44px;"></div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
      <button class="btn btn-primary" id="btnCheck" onclick="checkAnswer()">✓ Kiểm tra</button>
      <button class="btn" id="btnReset" onclick="resetChips()">↺ Làm lại</button>
      <button class="btn btn-primary" id="btnNext" onclick="nextSentence()" style="display:none; margin-left:auto;">Câu tiếp theo →</button>
    </div>

    <div id="feedback" style="display:none; border-radius:12px; padding:16px 18px; margin-bottom:16px;"></div>
  </div>

  <!-- ═══ SCREEN 3: KẾT QUẢ ═══ -->
  <div id="screenResult" style="display:none;">
    <div class="card" style="text-align:center; padding:36px 24px; margin-bottom:24px;">
      <div id="resultEmoji" style="font-size:54px; margin-bottom:12px;"></div>
      <h2 id="resultTitle" style="margin-bottom:8px;"></h2>
      <p id="resultSub" style="color:var(--text-muted); margin-bottom:24px;"></p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="replayLevel()">↺ Luyện lại cấp này</button>
        <button class="btn" onclick="backToTopics()">Chọn chủ đề khác</button>
      </div>
    </div>
    <div id="resultList"></div>
  </div>

</div>
</section>

// ═══════════════════════════════════════════════════════════════
//  SMART ANSWER CHECK
//  Chấp nhận đúng nếu sự khác biệt duy nhất là thứ tự của các
//  từ trong một nhóm liên kết bởi "and" / "or" (ví dụ danh sách).
// ═══════════════════════════════════════════════════════════════
function stripComma(w){ return w.toLowerCase().replace(/,$/, ''); }

function isAcceptable(userWords, correctWords) {
  var u = userWords.join(' ');
  var c = correctWords.join(' ');
  if (u === c) return true;
  if (userWords.length !== correctWords.length) return false;

  // Phải dùng đúng bộ từ (bỏ qua dấu phẩy cuối và hoa/thường)
  var uSet = userWords.map(stripComma).slice().sort().join('|');
  var cSet = correctWords.map(stripComma).slice().sort().join('|');
  if (uSet !== cSet) return false;

  // Tìm vị trí khác nhau
  var diffs = [];
  for (var i = 0; i < correctWords.length; i++) {
    if (stripComma(userWords[i]) !== stripComma(correctWords[i])) diffs.push(i);
  }
  if (!diffs.length) return true;

  // Vùng khác nhau: từ vị trí nhỏ nhất đến lớn nhất
  var mn = diffs[0], mx = diffs[diffs.length - 1];

  // Mọi từ GIỮA vùng diff mà không thuộc diff phải là liên từ (and/or)
  var connectors = ['and', 'or'];
  for (var j = mn; j <= mx; j++) {
    if (diffs.indexOf(j) === -1) {
      var wu = stripComma(userWords[j]);
      var wc = stripComma(correctWords[j]);
      if (connectors.indexOf(wu) === -1 || connectors.indexOf(wc) === -1) return false;
    }
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
var state = {
  topic:null, level:null,
  sentences:[], current:0,
  score:0, results:[],
  words:[], shuffledWords:[], picked:[], checked:false
};

// ═══════════════════════════════════════════════════════════════
//  TOPIC SELECTION
// ═══════════════════════════════════════════════════════════════
function renderTopics() {
  document.getElementById('topicGrid').innerHTML = Object.keys(DATA).map(function(key){
    var t = DATA[key];
    return '<div class="topic-card" onclick="selectTopic(\''+key+'\')">'
      +'<div class="t-ico '+t.color+'">'+t.icon+'</div>'
      +'<h3>'+t.name+'</h3><p>'+t.nameVi+'</p></div>';
  }).join('');
}

function selectTopic(key) {
  state.topic = key;
  var t = DATA[key];
  document.getElementById('levelTopicLabel').innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:14px 18px;border:1px solid var(--border);">'
    +'<span style="font-size:28px;">'+t.icon+'</span>'
    +'<div><div style="font-weight:700;font-size:16px;">'+t.name+'</div>'
    +'<div style="font-size:13px;color:var(--text-muted);">'+t.nameVi+'</div></div></div>';

  var lvs = [
    {key:'A2', label:'A2', name:'Cơ bản', desc:'Câu 7-10 từ · từ vựng thông dụng', color:'#22c55e'},
    {key:'B1', label:'B1', name:'Trung cấp', desc:'Câu 10-14 từ · từ vựng học thuật cơ bản', color:'#f59e0b'},
    {key:'B2', label:'B2 / C1', name:'Nâng cao', desc:'Câu 14-17 từ · từ vựng học thuật nâng cao', color:'#7B6EF6'},
  ];
  document.getElementById('levelGrid').innerHTML = lvs.map(function(lv){
    return '<div class="level-btn" onclick="selectLevel(\''+lv.key+'\')">'
      +'<div class="lv-badge" style="color:'+lv.color+'">'+lv.label+'</div>'
      +'<span class="lv-name">'+lv.name+'</span>'
      +'<span class="lv-desc">'+lv.desc+'</span></div>';
  }).join('');
  show('screenLevel');
}

function backToTopics(){ state.topic=null; state.level=null; show('screenTopic'); }
function backToLevel() { state.level=null; show('screenLevel'); }

// ═══════════════════════════════════════════════════════════════
//  START EXERCISE
// ═══════════════════════════════════════════════════════════════
function selectLevel(lv) {
  state.level = lv;
  var raw = DATA[state.topic].sentences[lv];
  state.sentences = raw.slice().sort(function(){ return Math.random()-.5; });
  state.current=0; state.score=0; state.results=[];
  show('screenExercise');
  var t = DATA[state.topic];
  document.getElementById('exMeta').textContent = t.icon+' '+t.name+'  ·  '+lv;
  renderSentence();
}

// ═══════════════════════════════════════════════════════════════
//  RENDER SENTENCE
// ═══════════════════════════════════════════════════════════════
function renderSentence() {
  var total = state.sentences.length;
  var sentence = state.sentences[state.current];
  state.words = sentence.split(/\s+/).filter(Boolean);
  state.picked = []; state.checked = false;

  var pct = (state.current / total) * 100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = 'Câu '+(state.current+1)+'/'+total;
  document.getElementById('scoreLabel').textContent    = 'Đúng: '+state.score;

  // Xáo trộn từ
  state.shuffledWords = state.words.slice().sort(function(){ return Math.random()-.5; });

  renderAnswerArea();
  renderWordBank();
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('btnCheck').style.display  = 'inline-flex';
  document.getElementById('btnReset').style.display  = 'inline-flex';
  document.getElementById('btnNext').style.display   = 'none';
}

function renderWordBank() {
  var bank = document.getElementById('wordBank');
  bank.innerHTML = '';
  state.shuffledWords.forEach(function(w, si){
    if (state.picked.indexOf(si) > -1) return;
    var btn = mkChip(w);
    btn.onclick = function(){ pickWord(si); };
    bank.appendChild(btn);
  });
}

function renderAnswerArea() {
  var area = document.getElementById('answerArea');
  var ph = document.getElementById('answerPlaceholder');
  area.querySelectorAll('.word-chip').forEach(function(c){ c.remove(); });
  ph.style.display = state.picked.length ? 'none' : 'inline';
  area.className = 'answer-area'+(state.picked.length ? ' has-content' : '');
  state.picked.forEach(function(si, pos){
    var btn = mkChip(state.shuffledWords[si]);
    if (!state.checked) btn.onclick = function(){ unpickWord(pos); };
    area.appendChild(btn);
  });
}

function mkChip(w) {
  var btn = document.createElement('button');
  btn.className = 'word-chip'; btn.textContent = w; return btn;
}
function pickWord(si)    { if (state.checked) return; state.picked.push(si); redraw(); }
function unpickWord(pos) { if (state.checked) return; state.picked.splice(pos,1); redraw(); }
function redraw()        { renderAnswerArea(); renderWordBank(); document.getElementById('feedback').style.display='none'; }
function resetChips()    { if (state.checked) return; state.picked=[]; redraw(); }

// ═══════════════════════════════════════════════════════════════
//  CHECK ANSWER
// ═══════════════════════════════════════════════════════════════
function checkAnswer() {
  if (!state.picked.length){ alert('Bạn chưa xếp từ nào vào câu!'); return; }
  state.checked = true;

  var userWords    = state.picked.map(function(si){ return state.shuffledWords[si]; });
  var correctWords = state.words;
  var ok           = isAcceptable(userWords, correctWords);

  if (ok) state.score++;
  state.results.push({ sentence: state.sentences[state.current], user: userWords.join(' '), ok: ok });

  // Tô màu từng chip trong answer area
  var chips = document.getElementById('answerArea').querySelectorAll('.word-chip');
  if (ok) {
    chips.forEach(function(c){ c.classList.add('correct'); c.onclick=null; });
  } else {
    // So sánh từng vị trí với correctWords
    chips.forEach(function(c, i){
      var match = i < correctWords.length &&
                  stripComma(userWords[i]) === stripComma(correctWords[i]);
      c.classList.add(match ? 'correct' : 'wrong');
      c.onclick = null;
    });
  }
  // Làm mờ các từ còn trong bank
  document.getElementById('wordBank').querySelectorAll('.word-chip').forEach(function(c){
    c.classList.add('used');
  });

  document.getElementById('scoreLabel').textContent = 'Đúng: '+state.score;

  // Feedback
  var fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (ok) {
    fb.style.cssText = 'display:block;border-radius:12px;padding:16px 18px;margin-bottom:16px;background:#d1fae5;border:1.5px solid #6ee7b7;';
    fb.innerHTML = '<div style="font-size:22px;margin-bottom:4px;">🎉</div>'
      +'<div style="font-weight:700;color:#065f46;font-size:15px;">Chính xác! 🌟</div>'
      +'<div style="color:#065f46;margin-top:4px;font-size:14px;">'+hilite(correctWords, correctWords)+'</div>';
  } else {
    fb.style.cssText = 'display:block;border-radius:12px;padding:16px 18px;margin-bottom:16px;background:#fff7ed;border:1.5px solid #fcd34d;';
    fb.innerHTML = '<div style="font-size:22px;margin-bottom:4px;">🤔</div>'
      +'<div style="font-weight:700;color:#92400e;font-size:15px;">Chưa đúng — Câu đúng là:</div>'
      +'<div style="color:#78350f;margin-top:6px;font-size:14.5px;line-height:1.8;">'
      +hilite(correctWords, userWords)+'</div>';
  }

  document.getElementById('btnCheck').style.display = 'none';
  document.getElementById('btnReset').style.display = 'none';
  var btnNext = document.getElementById('btnNext');
  btnNext.style.display = 'inline-flex';
  btnNext.textContent = (state.current >= state.sentences.length-1) ? 'Xem kết quả →' : 'Câu tiếp theo →';
}

function hilite(correctWords, userWords) {
  return correctWords.map(function(w, i){
    var match = stripComma(userWords[i]||'') === stripComma(w);
    return '<span style="font-weight:700;'+(match?'color:#065f46':'color:#b91c1c;text-decoration:underline;')+'">'+esc(w)+'</span>';
  }).join(' ');
}

function nextSentence() {
  state.current++;
  if (state.current >= state.sentences.length) showResult();
  else renderSentence();
}

// ═══════════════════════════════════════════════════════════════
//  RESULT SCREEN
// ═══════════════════════════════════════════════════════════════
function showResult() {
  show('screenResult');
  var total = state.sentences.length;
  var pct   = Math.round((state.score/total)*100);
  var e,t,s;
  if (pct>=90){e='🏆';t='Xuất sắc!';s='Bạn gần như hoàn hảo — thử thử cấp cao hơn nhé!';}
  else if(pct>=70){e='🎯';t='Làm tốt lắm!';s='Chỉ cần luyện thêm một chút là hoàn hảo rồi!';}
  else if(pct>=50){e='📈';t='Cố lên nhé!';s='Luyện lại để cải thiện cấu trúc câu bạn nhé.';}
  else{e='💪';t='Tiếp tục cố gắng!';s='Đừng nản — luyện lại và bạn sẽ tiến bộ nhanh thôi!';}

  document.getElementById('resultEmoji').textContent = e;
  document.getElementById('resultTitle').textContent = t+' — '+state.score+'/'+total+' câu đúng ('+pct+'%)';
  document.getElementById('resultSub').textContent   = s;

  document.getElementById('resultList').innerHTML =
    '<div class="card"><div class="card-head"><h3>📋 Chi tiết kết quả</h3></div>'
    +state.results.map(function(r,i){
      return '<div class="result-row '+(r.ok?'ok':'bad')+'">'
        +'<span class="ri">'+(r.ok?'✅':'❌')+'</span>'
        +'<div><b>Câu '+(i+1)+':</b> '+esc(r.sentence)
        +(r.ok?'':'<br><span style="font-size:12.5px;opacity:.75;">Bạn đã viết: '+esc(r.user)+'</span>')
        +'</div></div>';
    }).join('')
    +'</div>';
}

function replayLevel(){ selectLevel(state.level); }

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function show(id){
  ['screenTopic','screenLevel','screenExercise','screenResult'].forEach(function(s){
    document.getElementById(s).style.display=(s===id)?'block':'none';
  });
}
function esc(s){
  return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});
}

renderTopics();
show('screenTopic');
</script>
