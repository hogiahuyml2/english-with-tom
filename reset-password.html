<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt lại mật khẩu — English With Tom</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6F58EE">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=14">
</head>
<body data-page="login">
<div id="site-header"></div>

<section class="section">
  <div class="container">
    <div class="form-wrap">
      <div class="auth-card">

        <!-- Kiểm tra token hợp lệ -->
        <div id="paneLoading" style="text-align:center; padding:20px 0;">
          <p style="color:var(--text-muted);">Đang kiểm tra link...</p>
        </div>

        <!-- Form đặt mật khẩu mới -->
        <div id="paneReset" style="display:none;">
          <h2 style="font-size:22px; margin-bottom:6px;">Đặt mật khẩu mới 🔒</h2>
          <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Nhập mật khẩu mới cho tài khoản của bạn.</p>

          <div id="resetMsg" style="display:none;" class="note"></div>
          <div class="field">
            <label>Mật khẩu mới</label>
            <input type="password" id="newPass" placeholder="Tối thiểu 6 ký tự">
          </div>
          <div class="field">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu mới">
          </div>
          <button class="btn btn-primary btn-block" id="resetBtn">Đặt lại mật khẩu</button>
        </div>

        <!-- Thành công -->
        <div id="paneDone" style="display:none; text-align:center; padding:10px 0;">
          <div style="font-size:48px; margin-bottom:12px;">✅</div>
          <h3 style="margin-bottom:8px;">Mật khẩu đã được đặt lại!</h3>
          <p style="color:var(--text-muted); font-size:14px; line-height:1.6;">
            Mật khẩu mới của bạn đã được cập nhật. Bạn có thể đăng nhập ngay bây giờ.
          </p>
          <a href="login.html" class="btn btn-primary" style="margin-top:20px; display:inline-block;">Đăng nhập</a>
        </div>

        <!-- Link không hợp lệ -->
        <div id="paneInvalid" style="display:none; text-align:center; padding:10px 0;">
          <div style="font-size:48px; margin-bottom:12px;">⚠️</div>
          <h3 style="margin-bottom:8px; color:var(--warning);">Link không hợp lệ</h3>
          <p style="color:var(--text-muted); font-size:14px; line-height:1.6;" id="invalidMsg">
            Link đặt lại mật khẩu đã hết hạn hoặc đã được dùng.
          </p>
          <a href="forgot-password.html" class="btn btn-primary" style="margin-top:20px; display:inline-block;">Yêu cầu link mới</a>
        </div>

      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js?v=16"></script>
<script>
  var TOKEN = new URLSearchParams(location.search).get('token');

  function showPane(id) {
    ['paneLoading','paneReset','paneDone','paneInvalid'].forEach(function(p){
      document.getElementById(p).style.display = p === id ? 'block' : 'none';
    });
  }

  function msg(text, ok) {
    var el = document.getElementById('resetMsg');
    el.style.display = 'flex';
    el.style.background = ok ? 'var(--success-soft)' : 'var(--warning-soft)';
    el.style.borderColor = 'transparent';
    el.style.color = ok ? 'var(--success)' : 'var(--warning)';
    el.innerHTML = '<span>'+(ok?'✅':'⚠️')+'</span><div>'+text+'</div>';
  }

  // Nếu không có token trong URL thì báo lỗi ngay
  if (!TOKEN) {
    showPane('paneInvalid');
  } else {
    showPane('paneReset');
  }

  document.getElementById('resetBtn').addEventListener('click', async function() {
    var np = document.getElementById('newPass').value;
    var cp = document.getElementById('confirmPass').value;
    if (np.length < 6) { msg('Mật khẩu cần tối thiểu 6 ký tự.', false); return; }
    if (np !== cp) { msg('Hai mật khẩu không khớp.', false); return; }

    this.disabled = true;
    this.textContent = 'Đang cập nhật...';

    var r = await fetch('/api/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, newPassword: np })
    });
    var data = await r.json().catch(function() { return {}; });

    this.disabled = false;
    this.textContent = 'Đặt lại mật khẩu';

    if (!r.ok) {
      if (data.error && (data.error.includes('hết hạn') || data.error.includes('không hợp lệ'))) {
        document.getElementById('invalidMsg').textContent = data.error;
        showPane('paneInvalid');
      } else {
        msg(data.error || 'Đặt lại mật khẩu thất bại.', false);
      }
      return;
    }
    showPane('paneDone');
  });

  // Cho phép nhấn Enter
  ['newPass','confirmPass'].forEach(function(id) {
    document.getElementById(id).addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('resetBtn').click();
    });
  });
</script>
</body>
</html>
