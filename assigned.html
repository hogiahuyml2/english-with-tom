<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài tập được giao — English With Tom</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=9">
</head>
<body data-page="assigned" data-guard="student">
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="crumb">Trang chủ › Bài tập được giao</div>
    <h1>Bài tập được giao</h1>
    <p>Bài tập thầy/cô giao riêng cho bạn. Làm xong nộp để giáo viên chấm.</p>
  </div>
</section>

<section class="section" style="padding-top:34px;">
  <div class="container">

    <div class="note" style="margin-bottom:24px;">
      <span>📩</span>
      <div>Các bài tập này do giáo viên giao riêng. Bài Writing sẽ được <b>giáo viên trực tiếp chấm và nhận xét</b>.</div>
    </div>

    <div class="stat-grid" style="margin-bottom:24px;">
      <div class="stat-card"><div class="label">Cần làm</div><div class="value" style="color:var(--warning)" id="cntTodo">–</div></div>
      <div class="stat-card"><div class="label">Đã nộp / Đang chấm</div><div class="value" style="color:var(--info)" id="cntPending">–</div></div>
      <div class="stat-card"><div class="label">Đã có điểm</div><div class="value" style="color:var(--success)" id="cntDone">–</div></div>
    </div>

    <div id="assignedContent">
      <p style="text-align:center;color:var(--text-faint);padding:40px 0;">⏳ Đang tải bài tập...</p>
    </div>

  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js?v=9"></script>
<script>
  function fmtDate(iso){
    if (!iso) return '';
    try { var d=new Date(iso); return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(); }
    catch(e){ return iso.slice(0,10); }
  }
  function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

  function skillIcon(skill){
    return {Reading:'📖',Listening:'🎧',Writing:'✍️',Speaking:'🗣️'}[skill] || '📝';
  }
  function skillColor(skill){
    return {Reading:'ico-blue',Listening:'ico-teal',Writing:'ico-amber',Speaking:'ico-pink'}[skill] || 'ico-blue';
  }

  fetch('/api/my-assignments',{credentials:'same-origin'}).then(r=>{
    if (r.status===401){ location.href='login.html?next=assigned.html'; return null; }
    return r.json();
  }).then(function(d){
    if (!d) return;
    var list = d.assignments || [];

    var todo    = list.filter(function(a){ return !a.submitted; });
    var pending = list.filter(function(a){ return a.submitted===1 || a.submitted>0; });
    // we'll further split pending vs graded after loading sub data
    document.getElementById('cntTodo').textContent    = todo.length;
    document.getElementById('cntPending').textContent = pending.length;
    document.getElementById('cntDone').textContent    = '–';

    if (!list.length){
      document.getElementById('assignedContent').innerHTML =
        '<div class="card" style="text-align:center;padding:40px 20px;">' +
        '<div style="font-size:40px;margin-bottom:12px;">📭</div>' +
        '<p style="color:var(--text-muted);">Bạn chưa được giao bài tập nào.</p>' +
        '</div>';
      document.getElementById('cntTodo').textContent='0';
      document.getElementById('cntPending').textContent='0';
      document.getElementById('cntDone').textContent='0';
      return;
    }

    var html = '';

    /* ── Chưa nộp ── */
    if (todo.length){
      html += '<div class="card" style="margin-bottom:20px;"><div class="card-head"><h3>📋 Cần làm</h3></div>';
      todo.forEach(function(a){
        var ico = skillColor(a.skill);
        var deadlineHtml = a.deadline
          ? '<span style="background:#fff3cd;color:#856404;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:600;">⏰ Hạn '+fmtDate(a.deadline)+'</span>'
          : '';
        var noteHtml = a.note ? '<div style="font-size:12.5px;color:var(--text-muted);margin-top:3px;">📌 '+esc(a.note)+'</div>' : '';
        var practiceUrl = (a.skill==='Writing')
          ? 'practice-writing.html?id='+a.exercise_id+'&assigned=1'
          : 'practice-quiz.html?id='+a.exercise_id+'&assigned=1';
        html +=
          '<div class="task"><div class="task-left">' +
          '<div class="task-ico '+ico+'">'+skillIcon(a.skill)+'</div>' +
          '<div class="task-info"><h4>'+esc(a.title)+'</h4>' +
          '<div class="meta">'+esc(a.program)+' · '+esc(a.skill)+' · Giao bởi '+esc(a.teacher_name)+' · '+fmtDate(a.assigned_at)+'</div>' +
          noteHtml+'</div></div>' +
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">' +
          deadlineHtml+
          '<a class="btn btn-primary btn-sm" href="'+practiceUrl+'">Làm bài</a></div></div>';
      });
      html += '</div>';
    }

    /* ── Đã nộp ── */
    if (pending.length){
      html += '<div class="card"><div class="card-head"><h3>✅ Đã nộp</h3></div>';
      pending.forEach(function(a){
        var ico = skillColor(a.skill);
        html +=
          '<div class="task"><div class="task-left">' +
          '<div class="task-ico '+ico+'">'+skillIcon(a.skill)+'</div>' +
          '<div class="task-info"><h4>'+esc(a.title)+'</h4>' +
          '<div class="meta">'+esc(a.program)+' · '+esc(a.skill)+' · Đã nộp, chờ giáo viên chấm</div></div></div>' +
          '<span class="badge badge-grading">Đang chấm</span></div>';
      });
      html += '</div>';
    }

    document.getElementById('assignedContent').innerHTML = html || '<p style="color:var(--text-faint);text-align:center;padding:30px;">Không có bài tập.</p>';
  }).catch(function(){
    document.getElementById('assignedContent').innerHTML='<p style="color:var(--danger);text-align:center;padding:30px;">Không tải được dữ liệu.</p>';
  });
</script>
</body>
</html>
