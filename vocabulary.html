<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ vựng Flashcards — English With Tom</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=9">
<style>
/* ── Topic grid ── */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
  margin-top: 24px;
}
.topic-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px 16px;
  text-align: center;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  user-select: none;
}
.topic-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,.08);
  border-color: var(--primary);
}
.topic-card .t-emoji { font-size: 28px; display: block; margin-bottom: 8px; }
.topic-card .t-name  { font-weight: 700; font-size: 13.5px; color: var(--text); line-height: 1.3; }
.topic-card .t-sub   { font-size: 11.5px; color: var(--text-faint); margin-top: 3px; }
.topic-card .t-count { font-size: 11px; color: var(--text-faint); margin-top: 6px; }

/* ── Flashcard section ── */
#flashcard-section { display: none; }

.fc-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.fc-header h2 { font-size: 18px; font-weight: 700; margin: 0; flex: 1; }
.fc-counter  { font-size: 13px; color: var(--text-faint); white-space: nowrap; }

/* progress bar */
.fc-progress { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 24px; overflow: hidden; }
.fc-progress-bar { height: 100%; background: var(--gradient); border-radius: 99px; transition: width .3s; }

/* 3-D card scene */
.card-scene {
  perspective: 900px;
  width: 100%;
  max-width: 600px;
  margin: 0 auto 24px;
  cursor: pointer;
}
.card-scene:focus { outline: 2px solid var(--primary); outline-offset: 4px; border-radius: var(--radius); }

.card-3d {
  position: relative;
  width: 100%;
  padding-top: 56%;
  transform-style: preserve-3d;
  transition: transform .45s cubic-bezier(.4,0,.2,1);
}
.card-3d.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 32px;
  text-align: center;
  border: 2px solid var(--border);
}
.card-front { background: var(--bg-card); }
.card-back  {
  background: linear-gradient(135deg, #f3eeff 0%, #e8f4ff 100%);
  transform: rotateY(180deg);
  border-color: var(--primary);
}

.fc-word { font-size: clamp(26px, 5.5vw, 42px); font-weight: 700; color: var(--text); margin-bottom: 10px; }
.fc-ipa  { font-size: clamp(14px, 2.4vw, 18px); color: var(--primary); font-family: Georgia, serif; margin-bottom: 8px; letter-spacing: .02em; }
.fc-hint { font-size: 12px; color: var(--text-faint); margin-top: 10px; }

.fc-vi   { font-size: clamp(16px, 3.5vw, 26px); font-weight: 700; color: #5a2d91; margin-bottom: 14px; }
.fc-ex   { font-size: clamp(12.5px, 2vw, 15.5px); color: var(--text-muted); line-height: 1.75; font-style: italic; }
.fc-ex strong { font-style: normal; color: var(--primary); font-weight: 600; }

.flip-hint {
  font-size: 12px; color: var(--text-faint);
  text-align: center; margin-bottom: 16px;
}
.kbd {
  display: inline-block; background: var(--bg-soft);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 1px 6px; font-size: 11px; color: var(--text-muted);
  font-family: monospace;
}

/* nav */
.fc-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
}
.btn-nav {
  width: 44px; height: 44px;
  border: 1.5px solid var(--border); border-radius: 50%;
  background: var(--bg-card); font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: .15s; color: var(--text);
}
.btn-nav:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.btn-nav:disabled { opacity: .35; cursor: default; }

.fc-action-btn {
  padding: 9px 20px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: .15s; font-family: inherit;
  border: 1.5px solid transparent;
}
.btn-unknown { background: #fff0f0; color: var(--danger); border-color: #ffc5c5; }
.btn-unknown:hover { background: #ffe0e0; }
.btn-known   { background: #f0fff4; color: var(--success); border-color: #b2f2c5; }
.btn-known:hover { background: #d8f8e5; }
.btn-extra   { background: var(--bg-soft); color: var(--text-muted); border-color: var(--border); }
.btn-extra:hover { border-color: var(--primary); color: var(--primary); }

.fc-actions {
  display: flex; justify-content: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 20px;
}
.fc-stats {
  display: flex; gap: 16px; justify-content: center;
  font-size: 13px; color: var(--text-muted); flex-wrap: wrap;
}

/* result */
#fc-result { display:none; text-align:center; padding: 36px 24px; }
#fc-result .result-emoji { font-size: 56px; margin-bottom: 8px; }
#fc-result h3 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
#fc-result p  { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
#fc-result .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* search */
.topic-search {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px;
  background: var(--bg-card); color: var(--text);
  outline: none; transition: .15s; margin-top: 8px; box-sizing: border-box;
}
.topic-search:focus { border-color: var(--primary); }

@media (max-width: 480px) {
  .topic-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card-face  { padding: 20px 16px; }
  .btn-nav    { width: 40px; height: 40px; }
}
</style>
</head>
<body data-page="vocabulary" data-guard="auth">
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="crumb">Trang chủ › Từ vựng</div>
    <h1>Từ vựng Flashcards 🃏</h1>
    <p>25 chủ đề · 750 từ · Phiên âm IPA · Nghĩa tiếng Việt · Câu ví dụ thực tế.</p>
  </div>
</section>

<section class="section" style="padding-top:28px;">
  <div class="container">

    <!-- ── Topic browser ── -->
    <div id="topic-section">
      <input class="topic-search" id="topicSearch" placeholder="🔍 Tìm chủ đề (ví dụ: Education, Sức khỏe...)">
      <div class="topic-grid" id="topicGrid"></div>
    </div>

    <!-- ── Flashcard section ── -->
    <div id="flashcard-section">

      <div class="fc-header">
        <button class="btn btn-sm" id="backToTopics">← Chủ đề</button>
        <h2 id="fcTopicLabel"></h2>
        <span class="fc-counter" id="fcCounter">1 / 30</span>
      </div>

      <div class="fc-progress">
        <div class="fc-progress-bar" id="fcProgressBar" style="width:0%"></div>
      </div>

      <!-- 3-D card -->
      <div class="card-scene" id="cardScene" tabindex="0" role="button" aria-label="Nhấn để lật thẻ">
        <div class="card-3d" id="card3d">
          <div class="card-face card-front">
            <div class="fc-word" id="fcWord">—</div>
            <div class="fc-ipa"  id="fcIpa">—</div>
            <div class="fc-hint">Nhấn thẻ để xem nghĩa 👆</div>
          </div>
          <div class="card-face card-back">
            <div class="fc-vi" id="fcVi">—</div>
            <div class="fc-ex" id="fcEx">—</div>
          </div>
        </div>
      </div>

      <div class="flip-hint">
        <span class="kbd">Space</span> lật thẻ &nbsp;·&nbsp;
        <span class="kbd">←</span> <span class="kbd">→</span> điều hướng &nbsp;·&nbsp;
        <span class="kbd">K</span> đã biết &nbsp;·&nbsp;
        <span class="kbd">U</span> chưa biết
      </div>

      <div class="fc-nav">
        <button class="btn-nav" id="prevBtn" title="Từ trước (←)" disabled>‹</button>
        <button class="fc-action-btn btn-unknown" id="unknownBtn">✗ Chưa biết</button>
        <button class="fc-action-btn btn-known"   id="knownBtn">✓ Đã biết</button>
        <button class="btn-nav" id="nextBtn" title="Từ tiếp (→)">›</button>
      </div>

      <div class="fc-actions">
        <button class="fc-action-btn btn-extra" id="shuffleBtn">🔀 Xáo trộn</button>
        <button class="fc-action-btn btn-extra" id="resetBtn">↺ Làm lại từ đầu</button>
      </div>

      <div class="fc-stats" id="fcStats">
        <span>✅ Đã biết: <strong id="stKnown">0</strong></span>
        <span>❌ Chưa biết: <strong id="stUnknown">0</strong></span>
        <span>⬜ Chưa xem: <strong id="stSkipped">0</strong></span>
      </div>

      <!-- Result panel -->
      <div class="card" id="fc-result">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h3 id="resultTitle">Bạn đã xem hết tất cả các từ!</h3>
        <p id="resultMsg"></p>
        <div class="result-btns">
          <button class="btn btn-primary" id="reviewUnknownBtn">🔁 Ôn từ chưa biết</button>
          <button class="btn" id="restartAllBtn">↺ Học lại từ đầu</button>
          <button class="btn" id="backToTopics2">← Chủ đề khác</button>
        </div>
      </div>

    </div><!-- /flashcard-section -->

  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js?v=9"></script>
<script src="vocab-data.js"></script>
<script>
(function(){
  /* ── util ── */
  function esc(s){
    return String(s||'').replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }
  function highlightWord(sentence, word){
    var re = new RegExp('(\\b' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b)','i');
    return esc(sentence).replace(re,'<strong>$1</strong>');
  }
  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1; i>0; i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  /* ── topic grid ── */
  var topicGrid   = document.getElementById('topicGrid');
  var topicSearch = document.getElementById('topicSearch');

  function renderTopics(filter){
    filter = (filter||'').toLowerCase();
    topicGrid.innerHTML = '';
    VOCAB_TOPICS.forEach(function(t){
      if(filter && t.label.toLowerCase().indexOf(filter)===-1 && t.sub.toLowerCase().indexOf(filter)===-1) return;
      var parts = t.label.split(' ');
      var emoji = parts[0];
      var name  = parts.slice(1).join(' ');
      var div = document.createElement('div');
      div.className = 'topic-card';
      div.innerHTML =
        '<span class="t-emoji">'+emoji+'</span>'+
        '<div class="t-name">'+esc(name)+'</div>'+
        '<div class="t-sub">'+esc(t.sub)+'</div>'+
        '<div class="t-count">'+t.words.length+' từ</div>';
      div.addEventListener('click', function(){ startTopic(t); });
      topicGrid.appendChild(div);
    });
    if(!topicGrid.children.length){
      topicGrid.innerHTML = '<p style="color:var(--text-faint);grid-column:1/-1;padding:24px 0;text-align:center;">Không tìm thấy chủ đề.</p>';
    }
  }

  topicSearch.addEventListener('input', function(){ renderTopics(this.value); });
  renderTopics();

  /* ── flashcard state ── */
  var deck    = [];
  var idx     = 0;
  var known   = {};   // deck-index → true / false
  var flipped = false;

  /* ── elements ── */
  var topicSection  = document.getElementById('topic-section');
  var flashSection  = document.getElementById('flashcard-section');
  var fcResult      = document.getElementById('fc-result');
  var card3d        = document.getElementById('card3d');
  var cardScene     = document.getElementById('cardScene');
  var fcWord        = document.getElementById('fcWord');
  var fcIpa         = document.getElementById('fcIpa');
  var fcVi          = document.getElementById('fcVi');
  var fcEx          = document.getElementById('fcEx');
  var fcCounter     = document.getElementById('fcCounter');
  var fcProgressBar = document.getElementById('fcProgressBar');
  var fcTopicLabel  = document.getElementById('fcTopicLabel');
  var stKnown       = document.getElementById('stKnown');
  var stUnknown     = document.getElementById('stUnknown');
  var stSkipped     = document.getElementById('stSkipped');
  var prevBtn       = document.getElementById('prevBtn');
  var nextBtn       = document.getElementById('nextBtn');
  var knownBtn      = document.getElementById('knownBtn');
  var unknownBtn    = document.getElementById('unknownBtn');

  function getFlipHint()   { return document.querySelector('.flip-hint'); }
  function getFcNav()      { return document.querySelector('.fc-nav'); }
  function getFcActions()  { return document.querySelector('.fc-actions'); }
  function getFcStats()    { return document.getElementById('fcStats'); }

  /* ── start topic ── */
  function startTopic(topic){
    deck    = topic.words.slice();
    idx     = 0;
    known   = {};
    flipped = false;
    fcTopicLabel.textContent = topic.label;
    topicSection.style.display = 'none';
    flashSection.style.display = 'block';
    showFlashUI();
    renderCard();
    cardScene.focus();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  /* ── render ── */
  function renderCard(){
    if(!deck.length) return;
    var w = deck[idx];

    // reset to front
    card3d.classList.remove('flipped');
    flipped = false;

    fcWord.textContent = w.w;
    fcIpa.textContent  = w.ipa;
    fcVi.textContent   = w.vi;
    fcEx.innerHTML     = highlightWord(w.ex, w.w);

    fcCounter.textContent = (idx+1) + ' / ' + deck.length;

    var reviewed = Object.keys(known).length;
    var pct = deck.length ? Math.round(reviewed / deck.length * 100) : 0;
    fcProgressBar.style.width = pct + '%';

    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === deck.length - 1);

    updateStats();
  }

  function updateStats(){
    var k=0, u=0;
    for(var key in known){ if(known[key]) k++; else u++; }
    stKnown.textContent   = k;
    stUnknown.textContent = u;
    stSkipped.textContent = deck.length - k - u;
  }

  /* ── flip ── */
  function flipCard(){
    flipped = !flipped;
    card3d.classList.toggle('flipped', flipped);
  }

  /* ── mark & advance ── */
  function markCard(isKnown){
    known[idx] = isKnown;
    updateStats();
    if(idx < deck.length - 1){
      idx++;
      renderCard();
    } else {
      showResult();
    }
  }

  /* ── result ── */
  function showResult(){
    var k=0, u=0;
    for(var key in known){ if(known[key]) k++; else u++; }
    var pct = deck.length ? Math.round(k / deck.length * 100) : 0;

    document.getElementById('resultEmoji').textContent  = pct>=80 ? '🎉' : pct>=50 ? '💪' : '📖';
    document.getElementById('resultTitle').textContent  =
      pct>=80 ? 'Xuất sắc! Bạn nhớ ' + k + '/' + deck.length + ' từ!' :
      pct>=50 ? 'Khá tốt! Bạn nhớ '  + k + '/' + deck.length + ' từ.' :
                'Cố lên! Bạn nhớ '    + k + '/' + deck.length + ' từ.';
    document.getElementById('resultMsg').textContent    =
      u > 0 ? 'Còn ' + u + ' từ chưa nhớ — hãy ôn lại nhé!' : 'Tuyệt vời! Bạn đã thuộc hết chủ đề này!';

    fcProgressBar.style.width = '100%';
    fcResult.style.display    = 'block';
    cardScene.style.display   = 'none';
    getFlipHint().style.display  = 'none';
    getFcNav().style.display     = 'none';
    getFcActions().style.display = 'none';
    getFcStats().style.display   = 'none';
  }

  function showFlashUI(){
    fcResult.style.display      = 'none';
    cardScene.style.display     = 'block';
    getFlipHint().style.display  = '';
    getFcNav().style.display     = '';
    getFcActions().style.display = '';
    getFcStats().style.display   = '';
  }

  function goBackToTopics(){
    flashSection.style.display = 'none';
    topicSection.style.display = 'block';
    showFlashUI();
    topicSearch.value = '';
    renderTopics();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  /* ── button events ── */
  cardScene.addEventListener('click', flipCard);

  prevBtn.addEventListener('click', function(){ if(idx>0){ idx--; renderCard(); } });
  nextBtn.addEventListener('click', function(){ if(idx<deck.length-1){ idx++; renderCard(); } });

  knownBtn.addEventListener('click',   function(){ markCard(true);  });
  unknownBtn.addEventListener('click', function(){ markCard(false); });

  document.getElementById('shuffleBtn').addEventListener('click', function(){
    deck  = shuffle(deck);
    idx   = 0;
    known = {};
    showFlashUI();
    renderCard();
    cardScene.focus();
  });

  document.getElementById('resetBtn').addEventListener('click', function(){
    idx   = 0;
    known = {};
    showFlashUI();
    renderCard();
    cardScene.focus();
  });

  document.getElementById('backToTopics').addEventListener('click',  goBackToTopics);
  document.getElementById('backToTopics2').addEventListener('click', goBackToTopics);

  document.getElementById('reviewUnknownBtn').addEventListener('click', function(){
    var sub = deck.filter(function(_,i){ return known[i] === false; });
    if(!sub.length){ alert('Không có từ nào chưa biết!'); return; }
    deck  = sub;
    idx   = 0;
    known = {};
    showFlashUI();
    renderCard();
    cardScene.focus();
  });

  document.getElementById('restartAllBtn').addEventListener('click', function(){
    idx   = 0;
    known = {};
    showFlashUI();
    renderCard();
    cardScene.focus();
  });

  /* ── keyboard ── */
  document.addEventListener('keydown', function(e){
    if(flashSection.style.display === 'none') return;
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch(e.key){
      case ' ':
        e.preventDefault();
        if(fcResult.style.display === 'none') flipCard();
        break;
      case 'ArrowLeft':
        e.preventDefault();
        if(idx > 0){ idx--; renderCard(); }
        break;
      case 'ArrowRight':
        e.preventDefault();
        if(idx < deck.length-1){ idx++; renderCard(); }
        break;
      case 'k': case 'K':
        if(fcResult.style.display === 'none') markCard(true);
        break;
      case 'u': case 'U':
        if(fcResult.style.display === 'none') markCard(false);
        break;
      case 'Escape':
        goBackToTopics();
        break;
    }
  });

})();
</script>
</body>
</html>
