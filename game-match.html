<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghép ảnh – Từ 🎯 — English With Tom</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=10">
<style>
body { background:linear-gradient(150deg,#f0fdf4 0%,#dcfce7 40%,#f0f9ff 100%) fixed; }

/* Topic picker */
.topic-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
.topic-btn {
  border:2.5px solid var(--border); border-radius:16px; padding:20px 14px;
  text-align:center; cursor:pointer; background:#fff;
  transition:all .18s; font-family:var(--font);
}
.topic-btn:hover { border-color:#22c55e; transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.1); }
.topic-btn .t-icon { font-size:36px; display:block; margin-bottom:8px; }
.topic-btn .t-name { font-size:14px; font-weight:700; color:var(--text); display:block; }
.topic-btn .t-vi   { font-size:12px; color:var(--text-muted); }

/* Game area */
.match-arena {
  display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:480px; margin:0 auto;
}
.match-col { display:flex; flex-direction:column; gap:10px; }
.match-col-head { font-size:13px; font-weight:700; color:var(--text-muted); text-align:center; margin-bottom:4px; }

.match-card {
  border:2.5px solid var(--border); border-radius:14px; padding:10px 8px;
  text-align:center; cursor:pointer; background:#fff;
  transition:all .2s; user-select:none; min-height:64px;
  display:flex; align-items:center; justify-content:center;
}
.match-card:hover:not(.matched):not(.disabled) { border-color:var(--primary); transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.1); }
.match-card.selected { border-color:#f59e0b; background:#fffbeb; box-shadow:0 0 0 3px rgba(245,158,11,.25); }
.match-card.matched  { border-color:#22c55e; background:#f0fdf4; opacity:.7; cursor:default; }
.match-card.wrong    { border-color:#ef4444; background:#fef2f2; animation:shake .35s ease; }
.match-card.disabled { pointer-events:none; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

.img-card-inner { font-size:38px; line-height:1; }
.word-card-inner { font-size:17px; font-weight:800; letter-spacing:.04em; color:var(--text); }

/* Progress */
.prog-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.match-score { font-size:20px; font-weight:800; color:#22c55e; }

/* Result overlay */
.result-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center;
  justify-content:center; z-index:1000; display:none;
}
.result-overlay.show { display:flex; }
.result-card {
  background:#fff; border-radius:28px; padding:40px 36px; text-align:center;
  max-width:360px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,.3);
  animation:popIn .35s ease;
}
@keyframes popIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.result-stars { font-size:44px; margin-bottom:12px; }
.result-big   { font-size:28px; font-weight:800; margin-bottom:6px; }
.confetti { position:fixed; pointer-events:none; top:0; left:0; width:100%; height:100%; z-index:999; }

/* Timer */
.timer-pill {
  display:inline-flex; align-items:center; gap:6px;
  background:#fef3c7; border:1.5px solid #fbbf24; border-radius:20px;
  padding:4px 14px; font-size:14px; font-weight:700; color:#92400e;
}
</style>
</head>
<body data-page="" data-guard="auth">
<div id="site-header"></div>

<section class="page-hero" style="padding:28px 0 24px;">
  <div class="container">
    <div class="crumb"><a href="practice.html">Luyện tập</a> › Games for Kids › Ghép ảnh – Từ</div>
    <h1 style="font-size:26px;">🎯 Ghép ảnh – Từ</h1>
    <p style="font-size:14px;">Bấm vào ảnh, rồi bấm vào từ đúng để ghép thành cặp — ghép hết trước khi hết giờ!</p>
  </div>
</section>

<section class="section" style="padding:20px 0 60px;">
<div class="container" style="max-width:560px;">

  <!-- ─── TOPIC PICKER ─── -->
  <div id="screenTopic">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;">Chọn chủ đề 📚</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>

  <!-- ─── GAME SCREEN ─── -->
  <div id="screenGame" style="display:none;">
    <div class="prog-top">
      <span id="pairLabel" style="font-size:14px;font-weight:600;color:var(--text-muted);"></span>
      <span class="timer-pill">⏱ <span id="timerVal">60</span>s</span>
      <span class="match-score">✅ <span id="scoreVal">0</span> / <span id="totalVal">8</span></span>
    </div>

    <div class="match-arena">
      <div>
        <div class="match-col-head">Hình ảnh</div>
        <div class="match-col" id="colLeft"></div>
      </div>
      <div>
        <div class="match-col-head">Từ vựng</div>
        <div class="match-col" id="colRight"></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;">
      <button class="btn" onclick="goTopic()">🏠 Đổi chủ đề</button>
    </div>
  </div>

</div>
</section>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-stars" id="resultStars"></div>
    <div class="result-big" id="resultScore"></div>
    <div id="resultMsg" style="font-size:15px;color:var(--text-muted);margin-bottom:24px;"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="replay()">↺ Chơi lại</button>
      <button class="btn" onclick="goTopic()">Đổi chủ đề</button>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="js/main.js?v=11"></script>
<script>
/* ══════════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════════ */
var TOPICS = [
  { id:'animals', name:'Animals', nameVi:'Động vật', icon:'🐾', bg:'#bbf7d0', accent:'#15803d',
    words:[{w:'CAT',e:'🐱'},{w:'DOG',e:'🐶'},{w:'COW',e:'🐮'},{w:'PIG',e:'🐷'},
           {w:'FROG',e:'🐸'},{w:'LION',e:'🦁'},{w:'BEAR',e:'🐻'},{w:'FOX',e:'🦊'},
           {w:'BEE',e:'🐝'},{w:'BIRD',e:'🐦'},{w:'FISH',e:'🐟'},{w:'DUCK',e:'🦆'}] },
  { id:'food', name:'Food', nameVi:'Thức ăn', icon:'🍎', bg:'#fecaca', accent:'#dc2626',
    words:[{w:'CAKE',e:'🎂'},{w:'MILK',e:'🥛'},{w:'EGG',e:'🥚'},{w:'BREAD',e:'🍞'},
           {w:'APPLE',e:'🍎'},{w:'GRAPE',e:'🍇'},{w:'PIZZA',e:'🍕'},{w:'CORN',e:'🌽'},
           {w:'SOUP',e:'🍲'},{w:'BANANA',e:'🍌'},{w:'LEMON',e:'🍋'},{w:'CANDY',e:'🍬'}] },
  { id:'colors', name:'Colors', nameVi:'Màu sắc', icon:'🎨', bg:'#e9d5ff', accent:'#7c3aed',
    words:[{w:'RED',e:'🔴',c:'#ef4444'},{w:'BLUE',e:'🔵',c:'#3b82f6'},
           {w:'GREEN',e:'🟢',c:'#22c55e'},{w:'YELLOW',e:'🟡',c:'#fbbf24'},
           {w:'PINK',e:'🩷',c:'#f472b6'},{w:'BLACK',e:'⚫',c:'#1f2937'},
           {w:'ORANGE',e:'🟠',c:'#f97316'},{w:'BROWN',e:'🟤',c:'#92400e'},
           {w:'PURPLE',e:'🟣',c:'#7c3aed'},{w:'GREY',e:'🩶',c:'#6b7280'}] },
  { id:'body', name:'Body Parts', nameVi:'Cơ thể', icon:'👁️', bg:'#fed7aa', accent:'#ea580c',
    words:[{w:'EYE',e:'👁️'},{w:'EAR',e:'👂'},{w:'NOSE',e:'👃'},{w:'HAND',e:'✋'},
           {w:'FOOT',e:'🦶'},{w:'LEG',e:'🦵'},{w:'ARM',e:'💪'},{w:'HEAD',e:'🗣️'},
           {w:'MOUTH',e:'👄'},{w:'TEETH',e:'🦷'},{w:'HAIR',e:'💇'},{w:'FACE',e:'😊'}] },
  { id:'clothes', name:'Clothes', nameVi:'Quần áo', icon:'👕', bg:'#bae6fd', accent:'#0284c7',
    words:[{w:'HAT',e:'🎩'},{w:'CAP',e:'🧢'},{w:'SOCK',e:'🧦'},{w:'SHOE',e:'👟'},
           {w:'COAT',e:'🧥'},{w:'DRESS',e:'👗'},{w:'SHIRT',e:'👕'},{w:'JEANS',e:'👖'},
           {w:'SCARF',e:'🧣'},{w:'GLOVE',e:'🧤'},{w:'BOOT',e:'👢'},{w:'BELT',e:'🎗️'}] },
  { id:'school', name:'School', nameVi:'Học tập', icon:'📚', bg:'#fef9c3', accent:'#ca8a04',
    words:[{w:'PEN',e:'🖊️'},{w:'BOOK',e:'📚'},{w:'RULER',e:'📏'},{w:'BELL',e:'🔔'},
           {w:'PENCIL',e:'✏️'},{w:'CRAYON',e:'🖍️'},{w:'CLOCK',e:'🕐'},
           {w:'GLOBE',e:'🌍'},{w:'PAPER',e:'📄'},{w:'BAG',e:'🎒'},
           {w:'DESK',e:'🪑'},{w:'CHALK',e:'🖊️'}] },
];

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
var PAIR_COUNT = 8;
var G = {
  topic: null,
  pairs: [],        // [{w,e,c}] selected pairs
  leftItems: [],    // order for left column (indices into pairs)
  rightItems: [],   // shuffled order for right column
  selLeft:  -1,     // selected left card index (-1 = none)
  selRight: -1,     // selected right card index (-1 = none)
  matched:  [],     // set of matched pair indices
  score: 0,
  timer: 60,
  timerInt: null,
  busy: false,
};

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
function init() {
  var grid = document.getElementById('topicGrid');
  grid.innerHTML = TOPICS.map(function(t){
    return '<div class="topic-btn" onclick="startGame(\''+t.id+'\')">'+
      '<span class="t-icon">'+t.icon+'</span>'+
      '<span class="t-name">'+t.name+'</span>'+
      '<span class="t-vi">'+t.nameVi+'</span></div>';
  }).join('');
}

/* ══════════════════════════════════════════════════════
   START
══════════════════════════════════════════════════════ */
function startGame(topicId) {
  G.topic    = TOPICS.find(function(t){ return t.id===topicId; });
  G.pairs    = shuffle(G.topic.words.slice()).slice(0, PAIR_COUNT);
  G.leftItems  = G.pairs.map(function(_,i){ return i; });
  G.rightItems = shuffle(G.pairs.map(function(_,i){ return i; }));
  G.selLeft    = -1;
  G.selRight   = -1;
  G.matched    = [];
  G.score      = 0;
  G.busy       = false;
  G.timer      = 60;

  document.getElementById('screenTopic').style.display = 'none';
  document.getElementById('screenGame').style.display  = 'block';
  document.getElementById('totalVal').textContent = PAIR_COUNT;

  renderColumns();
  startTimer();
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderColumns() {
  var colL = document.getElementById('colLeft');
  var colR = document.getElementById('colRight');

  colL.innerHTML = G.leftItems.map(function(pairIdx, colPos) {
    var p   = G.pairs[pairIdx];
    var bg  = p.c || G.topic.bg;
    var matched = G.matched.indexOf(pairIdx) !== -1;
    var selClass = (G.selLeft === colPos && !matched) ? ' selected' : '';
    var matchClass = matched ? ' matched' : '';
    return '<div class="match-card'+selClass+matchClass+'" id="L'+colPos+'" onclick="clickLeft('+colPos+')">'+
      '<div class="img-card-inner" style="font-size:38px;">'+p.e+'</div></div>';
  }).join('');

  colR.innerHTML = G.rightItems.map(function(pairIdx, colPos) {
    var p   = G.pairs[pairIdx];
    var matched = G.matched.indexOf(pairIdx) !== -1;
    var selClass = (G.selRight === colPos && !matched) ? ' selected' : '';
    var matchClass = matched ? ' matched' : '';
    return '<div class="match-card'+selClass+matchClass+'" id="R'+colPos+'" onclick="clickRight('+colPos+')">'+
      '<div class="word-card-inner">'+p.w+'</div></div>';
  }).join('');

  document.getElementById('scoreVal').textContent = G.score;
  document.getElementById('pairLabel').textContent = 'Đã ghép: '+G.score+'/'+PAIR_COUNT;
}

/* ══════════════════════════════════════════════════════
   CLICK LOGIC
══════════════════════════════════════════════════════ */
function clickLeft(colPos) {
  if (G.busy) return;
  var pairIdx = G.leftItems[colPos];
  if (G.matched.indexOf(pairIdx) !== -1) return;
  G.selLeft = colPos;
  renderColumns();
  if (G.selRight !== -1) checkMatch();
}

function clickRight(colPos) {
  if (G.busy) return;
  var pairIdx = G.rightItems[colPos];
  if (G.matched.indexOf(pairIdx) !== -1) return;
  G.selRight = colPos;
  renderColumns();
  if (G.selLeft !== -1) checkMatch();
}

function checkMatch() {
  var leftPair  = G.leftItems[G.selLeft];
  var rightPair = G.rightItems[G.selRight];

  if (leftPair === rightPair) {
    // Correct match
    G.matched.push(leftPair);
    G.score++;
    var lEl = document.getElementById('L'+G.selLeft);
    var rEl = document.getElementById('R'+G.selRight);
    if (lEl) lEl.classList.add('matched');
    if (rEl) rEl.classList.add('matched');
    G.selLeft = -1; G.selRight = -1;
    document.getElementById('scoreVal').textContent = G.score;
    document.getElementById('pairLabel').textContent = 'Đã ghép: '+G.score+'/'+PAIR_COUNT;
    if (G.matched.length === PAIR_COUNT) {
      clearInterval(G.timerInt);
      setTimeout(showResult, 400);
    }
  } else {
    // Wrong
    G.busy = true;
    var lEl2 = document.getElementById('L'+G.selLeft);
    var rEl2 = document.getElementById('R'+G.selRight);
    if (lEl2) { lEl2.classList.remove('selected'); lEl2.classList.add('wrong'); }
    if (rEl2) { rEl2.classList.remove('selected'); rEl2.classList.add('wrong'); }
    setTimeout(function(){
      G.selLeft = -1; G.selRight = -1; G.busy = false;
      renderColumns();
    }, 600);
  }
}

/* ══════════════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════════════ */
function startTimer() {
  clearInterval(G.timerInt);
  document.getElementById('timerVal').textContent = G.timer;
  G.timerInt = setInterval(function(){
    G.timer--;
    document.getElementById('timerVal').textContent = G.timer;
    if (G.timer <= 10) {
      document.querySelector('.timer-pill').style.background = '#fee2e2';
      document.querySelector('.timer-pill').style.borderColor = '#ef4444';
      document.querySelector('.timer-pill').style.color = '#dc2626';
    }
    if (G.timer <= 0) { clearInterval(G.timerInt); showResult(); }
  }, 1000);
}

/* ══════════════════════════════════════════════════════
   RESULT
══════════════════════════════════════════════════════ */
function showResult() {
  var pct = Math.round(G.score / PAIR_COUNT * 100);
  var stars, msg;
  if (pct >= 90)      { stars='⭐⭐⭐'; msg='Xuất sắc! Bạn ghép giỏi quá! 🎉'; }
  else if (pct >= 50) { stars='⭐⭐'; msg='Tốt lắm! Thử lại để đạt điểm cao hơn! 💪'; }
  else                { stars='⭐'; msg='Cố lên! Luyện thêm là giỏi ngay thôi! 🌟'; }

  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultScore').textContent = G.score+' / '+PAIR_COUNT+' cặp ('+pct+'%)';
  document.getElementById('resultMsg').textContent   = msg;
  document.getElementById('resultOverlay').classList.add('show');
  if (pct >= 50) launchConfetti();
}

function replay() {
  document.getElementById('resultOverlay').classList.remove('show');
  startGame(G.topic.id);
}
function goTopic() {
  clearInterval(G.timerInt);
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('screenGame').style.display  = 'none';
  document.getElementById('screenTopic').style.display = 'block';
  document.querySelector('.timer-pill').style.background='';
  document.querySelector('.timer-pill').style.borderColor='';
  document.querySelector('.timer-pill').style.color='';
}

/* ══════════════════════════════════════════════════════
   CONFETTI + UTILS
══════════════════════════════════════════════════════ */
function launchConfetti() {
  var canvas = document.createElement('canvas');
  canvas.className = 'confetti';
  canvas.width = innerWidth; canvas.height = innerHeight;
  document.body.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  var pieces = Array.from({length:80}, function(){
    return { x:Math.random()*canvas.width, y:-10, w:Math.random()*10+6, h:Math.random()*10+6,
      color:['#22c55e','#f59e0b','#7B6EF6','#f472b6','#38bdf8','#ef4444'][Math.floor(Math.random()*6)],
      r:Math.random()*360, sp:Math.random()*4+2, sw:Math.random()*3-1.5 };
  });
  var frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(function(p){
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
      p.y+=p.sp; p.x+=p.sw; p.r+=3;
    });
    frame++;
    if (frame < 90) requestAnimationFrame(draw); else canvas.remove();
  }
  draw();
}

function shuffle(arr) { return arr.sort(function(){ return Math.random()-.5; }); }

init();
</script>
</body>
</html>
