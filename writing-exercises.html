<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing — English With Tom</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6F58EE">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=13">
<style>
/* ── Preview card grid (IELTS) ── */
.ex-card-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:18px; margin-bottom:4px;
}
.ex-preview-card {
  background:#fff; border:2px solid var(--border); border-radius:var(--radius);
  overflow:hidden; cursor:pointer; transition:border-color .18s, box-shadow .18s, transform .14s;
  display:flex; flex-direction:column;
}
.ex-preview-card:hover { border-color:var(--primary); box-shadow:var(--shadow-hover); transform:translateY(-2px); }
.ex-thumb {
  position:relative; height:155px; background:var(--surface);
  overflow:hidden; flex-shrink:0;
}
.ex-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.ex-thumb-placeholder {
  width:100%; height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:5px;
}
.task-badge {
  position:absolute; top:10px; left:10px;
  font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px;
  text-transform:uppercase; letter-spacing:.05em; pointer-events:none;
}
.task-badge.t1 { background:#dbeafe; color:#1d4ed8; }
.task-badge.t2 { background:#fde8d8; color:#9a3412; }
.ex-card-body { padding:14px 16px 16px; display:flex; flex-direction:column; flex:1; gap:0; }
.ex-card-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.chip {
  display:inline-block; font-size:11px; font-weight:700; padding:2px 9px;
  border-radius:20px; white-space:nowrap;
}
.chip-type  { background:var(--primary-soft); color:var(--primary); }
.chip-band  { background:#fef9c3; color:#854d0e; }
.chip-topic { background:#dcfce7; color:#15803d; }
.ex-card-title { font-size:13.5px; font-weight:700; color:var(--text); margin:0 0 7px; line-height:1.45; }
.ex-card-excerpt { font-size:12.5px; color:var(--text-muted); line-height:1.6; margin:0 0 14px; flex:1; }
</style>
</head>
<body data-page="" data-guard="auth">
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="crumb" id="crumb">Trang chủ</div>
    <h1 id="pageTitle">Writing ✍️</h1>
    <p id="pageDesc">Luyện viết kèm chấm điểm tự động và nhận xét tiếng Việt.</p>
  </div>
</section>

<section class="section" style="padding-top:34px;">
  <div class="container">

    <!-- Filter bar — chỉ hiện cho IELTS -->
    <div class="fbar" id="ieltsFbar" style="display:none; margin-bottom:20px;">
      <div class="fbar-row">
        <div class="fbar-search-wrap">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><path d="m14 14 3 3"/></svg>
          <input class="fbar-search" id="wSearch" type="text" placeholder="Tìm theo tên bài...">
        </div>
        <span class="fbar-count" id="wCount"></span>
      </div>
      <div class="fbar-row">
        <span class="fbar-label">Task</span>
        <div class="fbar-pills" id="wTaskPills"></div>
      </div>
      <div class="fbar-row" id="wSubRow">
        <span class="fbar-label">Loại</span>
        <div class="fbar-pills" id="wSubPills"></div>
      </div>
    </div>

    <div id="partContainer">
      <div class="skill-card">
        <div class="test-row"><div class="name" style="color:var(--text-faint)">Đang tải...</div></div>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="js/main.js?v=13"></script>
<script>
(function(){

/* ══════════════════════════════════════════════════════════════
   Dữ liệu loại đề IELTS — chia sẻ với teacher.html
══════════════════════════════════════════════════════════════ */
var IELTS_TYPES = {
  // Task 1 — Academic
  t1_bar:     { task:1, icon:'📊', label:'Bar chart'             },
  t1_line:    { task:1, icon:'📈', label:'Line graph'            },
  t1_pie:     { task:1, icon:'🥧', label:'Pie chart'             },
  t1_table:   { task:1, icon:'📋', label:'Table'                 },
  t1_map:     { task:1, icon:'🗺️', label:'Map'                  },
  t1_process: { task:1, icon:'⚙️', label:'Process / Diagram'    },
  t1_mixed:   { task:1, icon:'📊', label:'Mixed charts'          },
  // Task 1 — General Training
  t1_formal:   { task:1, icon:'✉️',  label:'Formal letter'       },
  t1_semi:     { task:1, icon:'📄',  label:'Semi-formal letter'  },
  t1_informal: { task:1, icon:'💌',  label:'Informal letter'     },
  // Task 2
  t2_opinion:  { task:2, icon:'💬', label:'Opinion Essay'               },
  t2_discuss:  { task:2, icon:'⚖️', label:'Discussion (Both views)'     },
  t2_causes:   { task:2, icon:'🔗', label:'Causes & Solutions'          },
  t2_adv:      { task:2, icon:'➕', label:'Advantages & Disadvantages'  },
  t2_twopart:  { task:2, icon:'❓', label:'Two-part Questions'          },
  t2_problem:  { task:2, icon:'🔧', label:'Problem & Solution'          },
};

/* Màu placeholder cho từng nhóm */
var TYPE_THUMB_BG = {
  t1_bar:'#dbeafe', t1_line:'#dbeafe', t1_pie:'#dbeafe', t1_table:'#dbeafe',
  t1_map:'#dcfce7', t1_process:'#f3f0ff', t1_mixed:'#dbeafe',
  t1_formal:'#f0fdf4', t1_semi:'#f0fdf4', t1_informal:'#fce7f3',
  t2_opinion:'#fef3c7', t2_discuss:'#fef3c7', t2_causes:'#fff7ed',
  t2_adv:'#fff7ed', t2_twopart:'#fde8d8', t2_problem:'#fde8d8',
};

/* ══════════════════════════════════════════════════════════════
   Cấu hình chương trình
══════════════════════════════════════════════════════════════ */
var PROGRAMS = {
  KET:   { label:'KET',   tag:'A2 Key',         parent:'ket.html',
            parts:{ 'Part 1':'Email/Lời nhắn ngắn (≥25 từ)', 'Part 2':'Viết truyện ngắn từ tranh (≥35 từ)' } },
  PET:   { label:'PET',   tag:'B1 Preliminary', parent:'pet.html',
            parts:{ 'Part 1':'Email hoặc lời nhắn (≥100 từ)', 'Part 2':'Article, câu chuyện hoặc review (≥100 từ)' } },
  FCE:   { label:'FCE',   tag:'B2 First',        parent:'fce.html',
            parts:{ 'Part 1':'Essay nghị luận (140–190 từ)', 'Part 2':'Article / Review / Story (140–190 từ)' } },
  IELTS: { label:'IELTS', tag:'Band 0–9',        parent:'ielts.html',
            parts:{ 'Task 1':'Mô tả biểu đồ / bản đồ / quy trình / thư (≥150 từ)',
                    'Task 2':'Essay nghị luận (≥250 từ)' } },
  APTIS: { label:'APTIS', tag:'British Council', parent:'aptis.html',
            parts:{ 'Component 1':'Câu trả lời ngắn', 'Component 2':'Trả lời email',
                    'Component 3':'Bài viết dài', 'Component 4':'Essay' } },
};

/* ══════════════════════════════════════════════════════════════
   Tiện ích
══════════════════════════════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

function getPartKey(title){
  var m = title.match(/(Task|Part|Component)\s*(\d+)/i);
  if (!m) return { label:'Khác', order:999 };
  var t = m[1].charAt(0).toUpperCase()+m[1].slice(1).toLowerCase();
  return { label:t+' '+m[2], order:parseInt(m[2],10) };
}

/* ══════════════════════════════════════════════════════════════
   Render row — dùng cho KET / PET / FCE / APTIS
══════════════════════════════════════════════════════════════ */
function renderRow(e){
  var lvlMap = { KET:'A2 Key', PET:'B1 Preliminary', FCE:'B2 First', IELTS:'IELTS', APTIS:'APTIS' };
  var lvl = (lvlMap[e.program]||e.program)+' · Chấm tự động';
  return '<div class="test-row"><div><div class="name">'+esc(e.title)+'</div>'+
         '<div class="lvl">'+lvl+'</div></div>'+
         '<a class="btn btn-sm" href="practice-writing.html?id='+e.id+'">Làm bài</a></div>';
}

/* ══════════════════════════════════════════════════════════════
   Render preview card — IELTS
══════════════════════════════════════════════════════════════ */
function renderCard(e){
  var meta = {}; try{ meta = JSON.parse(e.metadata||'{}'); }catch(err){}
  var ti = e.task_type ? (IELTS_TYPES[e.task_type]||null) : null;
  var taskNum = ti ? ti.task : null;
  var typeIcon = ti ? ti.icon : '';
  var typeLbl  = ti ? ti.label : '';
  var taskCls  = taskNum===1 ? 't1' : 't2';
  var taskBadge = taskNum ? '<span class="task-badge '+taskCls+'">'+(taskNum===1?'Task 1':'Task 2')+'</span>' : '';

  /* Thumbnail */
  var thumbHtml;
  if (e.image_url) {
    thumbHtml = '<img src="'+esc(e.image_url)+'" alt="" loading="lazy">';
  } else {
    var bg = TYPE_THUMB_BG[e.task_type] || 'var(--primary-soft)';
    thumbHtml = '<div class="ex-thumb-placeholder" style="background:'+bg+'">'+
      '<span style="font-size:40px;">'+( typeIcon || '✍️' )+'</span>'+
      (typeLbl ? '<span style="font-size:11px;font-weight:700;color:#555;letter-spacing:.06em;text-transform:uppercase;">'+esc(typeLbl)+'</span>' : '')+
    '</div>';
  }

  /* Chips */
  var chips = '';
  if (typeLbl) chips += '<span class="chip chip-type">'+esc(typeIcon+' '+typeLbl)+'</span>';
  if (meta.band_target) chips += '<span class="chip chip-band">🎯 Band '+esc(meta.band_target)+'</span>';
  if (meta.topic_tag)   chips += '<span class="chip chip-topic">'+esc(meta.topic_tag)+'</span>';

  /* Excerpt — strip HTML tags */
  var excerpt = (e.excerpt||'').replace(/<[^>]+>/g,'').replace(/&[a-zA-Z]+;/g,' ').replace(/\s+/g,' ').trim();
  if (excerpt.length > 110) excerpt = excerpt.substring(0,110)+'…';

  return '<div class="ex-preview-card" onclick="location.href=\'practice-writing.html?id='+e.id+'\'">'+
    '<div class="ex-thumb">'+thumbHtml+taskBadge+'</div>'+
    '<div class="ex-card-body">'+
      (chips ? '<div class="ex-card-chips">'+chips+'</div>' : '')+
      '<div class="ex-card-title">'+esc(e.title)+'</div>'+
      (excerpt ? '<p class="ex-card-excerpt">'+esc(excerpt)+'</p>' : '')+
      '<a class="btn btn-primary btn-sm" href="practice-writing.html?id='+e.id+'" onclick="event.stopPropagation()">Làm bài →</a>'+
    '</div>'+
  '</div>';
}

/* ══════════════════════════════════════════════════════════════
   Khởi tạo header
══════════════════════════════════════════════════════════════ */
var urlParams = new URLSearchParams(location.search);
var program   = (urlParams.get('program')||'KET').toUpperCase();
var cfg       = PROGRAMS[program] || PROGRAMS.KET;
var partFilter = urlParams.get('part') || '';   // e.g. "Part 1", "Task 2", "Component 3"

/* ── Tiêu đề động theo part ── */
var partLabel = partFilter ? ' — ' + partFilter : '';
document.title = cfg.label+' Writing'+partLabel+' — English With Tom';

var crumbPart = partFilter ? ' › <span style="color:var(--text)">'+partFilter+'</span>' : '';
document.getElementById('crumb').innerHTML =
  '<a href="'+cfg.parent+'" style="color:inherit;">'+cfg.label+'</a> › '+
  (partFilter ? '<a href="writing-exercises.html?program='+program+'" style="color:inherit;">Writing</a>' : 'Writing')+
  crumbPart;

document.getElementById('pageTitle').textContent =
  cfg.label+' Writing'+(partFilter ? ' — '+partFilter : '')+' ✍️';

var partDesc = partFilter && cfg.parts[partFilter] ? cfg.parts[partFilter] : null;
document.getElementById('pageDesc').textContent = partDesc ||
  (cfg.label==='IELTS'
    ? 'IELTS Band 0–9 — luyện viết theo đúng định dạng, chấm tự động kèm nhận xét tiếng Việt.'
    : 'Cambridge '+cfg.tag+' — luyện viết theo đúng định dạng, chấm tự động kèm nhận xét tiếng Việt.');

/* ══════════════════════════════════════════════════════════════
   Fetch & render (+ IELTS filter)
══════════════════════════════════════════════════════════════ */
var partIcons = {
  'Part 1':'📧','Part 2':'📖','Part 3':'📝',
  'Task 1':'📊','Task 2':'✍️',
  'Component 1':'1️⃣','Component 2':'2️⃣','Component 3':'3️⃣','Component 4':'4️⃣',
  'Khác':'📄'
};
var icoColors = ['ico-amber','ico-pink','ico-blue','ico-teal'];

/* ── IELTS filter state ── */
var _allEx = [];
var _wF = { q:'', task:'', sub:'' };
var _wSearchTimer;

/* Subtype definitions split by task for filter display */
var T1_SUBS = ['t1_bar','t1_line','t1_pie','t1_table','t1_map','t1_process','t1_mixed','t1_formal','t1_semi','t1_informal'];
var T2_SUBS = ['t2_opinion','t2_discuss','t2_causes','t2_adv','t2_twopart','t2_problem'];

function wSetFilter(key, val) {
  _wF[key] = (_wF[key]===val) ? '' : val;
  if (key==='task') _wF.sub = ''; // clear subtype when task changes
  wRenderPills();
  wRenderIelts();
}
window.wSetFilter = wSetFilter;

function wClearFilters() {
  _wF.q=''; _wF.task=''; _wF.sub='';
  document.getElementById('wSearch').value='';
  wRenderPills();
  wRenderIelts();
}
window.wClearFilters = wClearFilters;

function wRenderPills() {
  // Task pills
  document.getElementById('wTaskPills').innerHTML =
    ['<button class="fpill'+(_wF.task===''?' active':'')+'" onclick="wSetFilter(\'task\',\'\')">Tất cả</button>',
     '<button class="fpill'+(_wF.task==='1'?' active':'')+'" onclick="wSetFilter(\'task\',\'1\')">📊 Task 1</button>',
     '<button class="fpill'+(_wF.task==='2'?' active':'')+'" onclick="wSetFilter(\'task\',\'2\')">✍️ Task 2</button>'
    ].join('');

  // Subtype pills — only show subtypes relevant to selected task
  var showSubs = (_wF.task==='1') ? T1_SUBS : (_wF.task==='2') ? T2_SUBS : [];
  var subRow = document.getElementById('wSubRow');

  if (showSubs.length === 0) {
    // "Tất cả": hide subtype row entirely
    subRow.style.display = 'none';
  } else {
    subRow.style.display = '';
    document.getElementById('wSubPills').innerHTML = showSubs.map(function(key) {
      var ti = IELTS_TYPES[key];
      if (!ti) return '';
      return '<button class="fpill'+(_wF.sub===key?' active':'')+'" onclick="wSetFilter(\'sub\',\''+key+'\')">'+ti.icon+' '+ti.label+'</button>';
    }).join('');
  }
}

function wRenderIelts() {
  var q = _wF.q.toLowerCase();
  var filtered = _allEx.filter(function(e) {
    if (q && !(e.title||'').toLowerCase().includes(q)) return false;
    if (_wF.task) {
      var ti = IELTS_TYPES[e.task_type];
      if (!ti || String(ti.task) !== _wF.task) return false;
    }
    if (_wF.sub && e.task_type !== _wF.sub) return false;
    return true;
  });

  document.getElementById('wCount').innerHTML = '<strong>'+filtered.length+'</strong> / '+_allEx.length+' bài';

  var container = document.getElementById('partContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:36px 20px;">'+
      '<div style="font-size:32px;margin-bottom:8px;">🔍</div>'+
      '<p style="color:var(--text-faint);">Không tìm thấy bài phù hợp.</p>'+
      '<button class="btn btn-sm" style="margin-top:10px;" onclick="wClearFilters()">Xóa bộ lọc</button>'+
      '</div>';
    return;
  }

  /* Group by Task 1 / Task 2 */
  var groups = {};
  filtered.forEach(function(e){
    var pk = getPartKey(e.title);
    if (!groups[pk.label]) groups[pk.label] = { order:pk.order, items:[] };
    groups[pk.label].items.push(e);
  });
  var sorted = Object.keys(groups).sort(function(a,b){ return groups[a].order - groups[b].order; });
  if (partFilter) sorted = sorted.filter(function(l){ return l===partFilter; });

  container.innerHTML = sorted.map(function(label, idx){
    var desc = cfg.parts[label] || 'Chấm tự động theo chuẩn IELTS Band 0–9';
    var icon = partIcons[label] || '✍️';
    var icoC = icoColors[idx%4];
    return '<div class="card" style="margin-bottom:28px;">'+
      '<div class="card-head">'+
        '<h3><span class="course-ico '+icoC+'" style="width:36px;height:36px;font-size:17px;margin:0;">'+icon+'</span> Writing '+esc(label)+'</h3>'+
        '<span class="tag">'+groups[label].items.length+' bài</span>'+
      '</div>'+
      '<p style="font-size:13.5px;color:var(--text-muted);margin:0 0 18px;">'+esc(desc)+'</p>'+
      '<div class="ex-card-grid">'+groups[label].items.map(renderCard).join('')+'</div>'+
    '</div>';
  }).join('');
}

fetch('/api/exercises?program='+encodeURIComponent(program)+'&skill=Writing',{credentials:'same-origin'})
  .then(function(r){ return r.json(); })
  .then(function(data){
    var list = (data.exercises||[]).filter(function(e){ return !e.is_private; });
    var container = document.getElementById('partContainer');

    if (!list.length){
      container.innerHTML = '<div class="skill-card"><div class="test-row"><div class="name" style="color:var(--text-faint)">Nội dung đang được biên soạn — giáo viên sẽ cập nhật sớm.</div></div></div>';
      return;
    }

    if (program === 'IELTS') {
      /* ─── IELTS: show filter bar + filterable card grid ─── */
      _allEx = list;
      var fbar = document.getElementById('ieltsFbar');
      fbar.style.display = '';

      // Wire search
      var searchEl = document.getElementById('wSearch');
      searchEl.addEventListener('input', function(){
        clearTimeout(_wSearchTimer);
        _wSearchTimer = setTimeout(function(){ _wF.q = searchEl.value.trim(); wRenderIelts(); }, 220);
      });

      wRenderPills();
      wRenderIelts();
    } else {
      /* ─── KET / PET / FCE / APTIS: danh sách rows ─── */
      var groups = {};
      list.forEach(function(e){
        var pk = getPartKey(e.title);
        if (!groups[pk.label]) groups[pk.label] = { order:pk.order, items:[] };
        groups[pk.label].items.push(e);
      });
      var sorted = Object.keys(groups).sort(function(a,b){ return groups[a].order - groups[b].order; });
      if (partFilter) sorted = sorted.filter(function(label){ return label === partFilter; });

      if (partFilter && !sorted.length) {
        container.innerHTML = '<div class="skill-card"><div class="test-row"><div class="name" style="color:var(--text-faint)">Nội dung đang được biên soạn — giáo viên sẽ cập nhật sớm.</div></div></div>';
        return;
      }

      container.innerHTML = sorted.map(function(label, idx){
        var desc = cfg.parts[label] || 'Chấm tự động theo chuẩn '+cfg.tag;
        var icon = partIcons[label] || '✍️';
        var icoC = icoColors[idx%4];
        return '<div class="skill-card" style="margin-bottom:20px;">'+
          '<h3><span class="course-ico '+icoC+'" style="width:40px;height:40px;font-size:19px;margin:0;">'+icon+'</span> Writing '+esc(label)+'</h3>'+
          '<p>'+esc(desc)+'</p>'+
          groups[label].items.map(renderRow).join('')+
        '</div>';
      }).join('');
    }
  })
  .catch(function(){
    document.getElementById('partContainer').innerHTML =
      '<div class="skill-card"><div class="test-row"><div class="name" style="color:var(--danger)">Không thể tải đề — vui lòng thử lại.</div></div></div>';
  });

})();
</script>
</body>
</html>
